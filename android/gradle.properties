# JVM: sized for 16 GB RAM — leaves headroom for Flutter tooling and the OS
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -XX:+UseG1GC -Dfile.encoding=UTF-8

# Parallel + incremental build
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true
org.gradle.daemon=true
org.gradle.daemon.idletimeout=3600000
org.gradle.workers.max=10

# Use a project-local Gradle user home so daemons from different projects
# don't compete for the same build-logic lock file
org.gradle.user.home=D:/gradle-home

# Android
android.useAndroidX=true
android.enableJetifier=false
android.defaults.buildfeatures.buildconfig=true
android.nonTransitiveRClass=true
android.nonFinalResIds=false

# Kotlin incremental MUST be disabled — pub cache lives on C:\ but project is on D:\
# Kotlin's RelocatableFileToPathConverter crashes with IllegalArgumentException when
# source files span different Windows drive letters (cross-drive incremental cache bug).
kotlin.incremental=false
kotlin.incremental.android=false
kotlin.caching.enabled=true
kotlin.parallel.tasks.in.project=true
